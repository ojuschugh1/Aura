<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">
      <span class="nav-logo">⚡</span> Aura
    </a>
    <div class="nav-links">
      <a href="{{ '/getting-started' | relative_url }}">Get Started</a>
      <a href="{{ '/wiki' | relative_url }}">Wiki</a>
      <a href="{{ '/autolearn' | relative_url }}">Auto-Learn</a>
      <a href="{{ '/commands' | relative_url }}">Commands</a>
      <a href="https://github.com/ojuschugh1/Aura" target="_blank">GitHub</a>
      <a href="https://github.com/ojuschugh1/Aura/releases/latest" class="nav-cta" target="_blank">Download</a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="content">
    {{ content }}
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <span>Aura — MIT License</span>
    <span>·</span>
    <a href="https://github.com/ojuschugh1/Aura">GitHub</a>
    <span>·</span>
    <a href="https://github.com/ojuschugh1/Aura/releases">Releases</a>
    <span>·</span>
    <a href="https://github.com/ojuschugh1/Aura/issues">Issues</a>
  </div>
</footer>

</body>
</html>
